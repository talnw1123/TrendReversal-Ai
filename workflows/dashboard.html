<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quant Dashboard</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet">

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0e14;
            --glass-bg: rgba(20, 24, 34, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --neon-blue: #00d2ff;
            --text-main: #f0f0f5;
            --text-muted: #8a91a6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1b3a, var(--bg-color) 40%);
            background-color: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Navbar / Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            backdrop-filter: blur(12px);
            background: rgba(11, 14, 20, 0.8);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .market-selector {
            display: flex;
            gap: 15px;
        }

        .market-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 10px 24px;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .market-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .market-btn.active {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        /* Dashboard Container */
        .container {
            padding: 30px 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Top Metrics Row */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-5px);
        }

        .metric-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .val-positive {
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .val-negative {
            color: var(--neon-red);
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
        }

        .val-neutral {
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        /* Chart Area */
        .chart-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            height: 750px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        #plotly-chart {
            width: 100%;
            height: 100%;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 14, 20, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            transition: opacity 0.5s fade;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <h2 style="margin-top:20px; font-family:'Outfit';">Initializing Neural Engines...</h2>
    </div>

    <header>
        <div class="logo">ANTIGRAVITY TRADING AI</div>
        <div class="market-selector" id="market-selector">
            <button class="market-btn active" onclick="loadMarket('BTC')">Bitcoin</button>
            <button class="market-btn" onclick="loadMarket('US')">US (^GSPC)</button>
            <button class="market-btn" onclick="loadMarket('UK')">UK (^FTSE)</button>
            <button class="market-btn" onclick="loadMarket('Thai')">Thai (^SET.BK)</button>
            <button class="market-btn" onclick="loadMarket('Gold')">Gold (GC=F)</button>
        </div>
    </header>

    <div class="container">
        <!-- Live Metrics via Database -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-title">Alpha (vs B&H)</div>
                <div class="metric-value" id="val-alpha">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Ai Strategy Return</div>
                <div class="metric-value" id="val-return">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Market Return (B&H)</div>
                <div class="metric-value" id="val-bnh">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Win Rate</div>
                <div class="metric-value val-neutral" id="val-winrate">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Max Drawdown</div>
                <div class="metric-value val-negative" id="val-dd">--</div>
            </div>
        </div>

        <!-- Master Interactive Plotly Chart -->
        <div class="chart-container">
            <div id="plotly-chart"></div>
        </div>
    </div>

    <script>
        // API Base (Defaulting to localhost for zero-dependency Python server)
        const API_URL = "http://localhost:8001/api/data";

        function updateUIActiveBtn(marketName) {
            document.querySelectorAll('.market-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.market-btn').forEach(btn => {
                if (btn.innerText.includes(marketName) || btn.getAttribute('onclick').includes(marketName)) {
                    btn.classList.add('active');
                }
            });
        }

        async function loadMarket(market) {
            document.getElementById('loader').style.display = 'flex';
            updateUIActiveBtn(market);

            try {
                const res = await fetch(`${API_URL}?market=${market}`);
                const data = await res.json();

                renderMetrics(data.stats);
                renderPlotly(data.history, market);
            } catch (err) {
                console.error("Failed to load SQLite data:", err);
                alert("Cannot connect to Python Backend. Did you start web_dashboard.py?");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderMetrics(stats) {
            if (!stats) return;

            const alpha = stats.base_return_pct - stats.bnh_return_pct;

            const elAlpha = document.getElementById('val-alpha');
            elAlpha.innerText = (alpha >= 0 ? '+' : '') + alpha.toFixed(2) + '%';
            elAlpha.className = 'metric-value ' + (alpha >= 0 ? 'val-positive' : 'val-negative');

            const elRet = document.getElementById('val-return');
            elRet.innerText = (stats.base_return_pct >= 0 ? '+' : '') + stats.base_return_pct.toFixed(2) + '%';
            elRet.className = 'metric-value ' + (stats.base_return_pct >= 0 ? 'val-positive' : 'val-negative');

            const elBnh = document.getElementById('val-bnh');
            elBnh.innerText = (stats.bnh_return_pct >= 0 ? '+' : '') + stats.bnh_return_pct.toFixed(2) + '%';
            elBnh.className = 'metric-value ' + (stats.bnh_return_pct >= 0 ? 'val-positive' : 'val-negative');

            document.getElementById('val-winrate').innerText = stats.win_rate_pct.toFixed(1) + '%';
            document.getElementById('val-dd').innerText = stats.max_drawdown_pct.toFixed(2) + '%';
        }

        function renderPlotly(history, market) {
            if (!history || history.length === 0) return;

            const dates = history.map(row => row.date);
            const prices = history.map(row => row.price);
            const eqLines = history.map(row => row.equity_curve);
            const bnhLines = history.map(row => row.bnh_curve);

            // 1. Build Buy / Sell Markers (By extracting positional jumps)
            let buyDates = [], buyPrices = [];
            let sellDates = [], sellPrices = [];

            for (let i = 1; i < history.length; i++) {
                let prev = history[i - 1].position;
                let curr = history[i].position;
                if (prev === 0 && curr === 1) {
                    buyDates.push(history[i].date);
                    buyPrices.push(history[i].price);
                } else if (prev === 1 && curr === 0) {
                    sellDates.push(history[i].date);
                    sellPrices.push(history[i].price);
                }
            }

            // 2. Build Regime Background Shapes (Merging contiguous blocks)
            let shapes_panel1 = [];
            let shapes_panel2 = [];

            let currentRegime = history[0].trend_regime.includes("1") ? 1 : 0;
            let startIdx = history[0].date;

            for (let i = 1; i < history.length; i++) {
                let r = history[i].trend_regime.includes("1") ? 1 : 0;

                if (r !== currentRegime || i === history.length - 1) {
                    let fill = currentRegime === 1 ? 'rgba(0, 255, 136, 0.04)' : 'rgba(255, 51, 102, 0.04)';

                    // Panel 1 Shape (yref: y or paper wouldn't map properly to dual axes easily if not using domains, so we use yref: paper)
                    shapes_panel1.push({
                        type: 'rect', xref: 'x', yref: 'y domain',
                        x0: startIdx, x1: history[i].date, y0: 0, y1: 1,
                        fillcolor: fill, layer: 'below', line: { width: 0 }
                    });

                    // Panel 2 Shape
                    shapes_panel2.push({
                        type: 'rect', xref: 'x2', yref: 'y2 domain',
                        x0: startIdx, x1: history[i].date, y0: 0, y1: 1,
                        fillcolor: fill, layer: 'below', line: { width: 0 }
                    });

                    currentRegime = r;
                    startIdx = history[i].date;
                }
            }

            let all_shapes = shapes_panel1.concat(shapes_panel2);

            // 3. Traces
            let tracePrice = {
                x: dates, y: prices,
                name: 'Price', type: 'scatter', mode: 'lines',
                line: { color: 'rgba(255, 255, 255, 0.9)', width: 2 },
                xaxis: 'x', yaxis: 'y'
            };

            let traceBuy = {
                x: buyDates, y: buyPrices,
                name: 'BUY Signal', type: 'scatter', mode: 'markers',
                marker: { symbol: 'triangle-up', size: 14, color: '#00ff88', line: { color: '#000', width: 1 } },
                xaxis: 'x', yaxis: 'y'
            };

            let traceSell = {
                x: sellDates, y: sellPrices,
                name: 'SELL Signal', type: 'scatter', mode: 'markers',
                marker: { symbol: 'triangle-down', size: 14, color: '#ff3366', line: { color: '#000', width: 1 } },
                xaxis: 'x', yaxis: 'y'
            };

            let traceEq = {
                x: dates, y: eqLines,
                name: 'AI Strategy ($10K)', type: 'scatter', mode: 'lines',
                line: { color: '#00d2ff', width: 2.5 },
                xaxis: 'x2', yaxis: 'y2'
            };

            let traceBnh = {
                x: dates, y: bnhLines,
                name: 'Buy & Hold ($10K)', type: 'scatter', mode: 'lines',
                line: { color: '#8a91a6', width: 2, dash: 'dot' },
                xaxis: 'x2', yaxis: 'y2'
            };

            let data = [tracePrice, traceBuy, traceSell, traceEq, traceBnh];

            let layout = {
                title: { text: `<b>${market} Interactive Backtest Analytics</b>`, font: { color: '#fff', size: 24, family: 'Outfit' } },
                plot_bgcolor: 'rgba(0,0,0,0)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#8a91a6', family: 'Inter' },
                margin: { l: 60, r: 40, t: 80, b: 40 },
                showlegend: true,
                legend: { orientation: 'h', y: -0.1, font: { color: '#fff' } },
                grid: { rows: 2, columns: 1, pattern: 'independent', roworder: 'top to bottom' },

                xaxis: { showgrid: false, zeroline: false, showticklabels: false, domain: [0, 1] },
                yaxis: { title: 'Price', gridcolor: 'rgba(255,255,255,0.05)', domain: [0.55, 1], type: 'log' },

                xaxis2: { title: 'Date', showgrid: false, zeroline: false, domain: [0, 1] },
                yaxis2: { title: 'Equity ($)', gridcolor: 'rgba(255,255,255,0.05)', domain: [0, 0.45] },

                shapes: all_shapes,
                hovermode: 'x unified'
            };

            Plotly.newPlot('plotly-chart', data, layout, { responsive: true });
        }

        // Initialize First Market
        window.onload = () => loadMarket('BTC');

    </script>
</body>

</html>
